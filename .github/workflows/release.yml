name: Release

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened]

jobs:
  check-source-branch:
    name: Validate PR Source Branch
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      skip: ${{ steps.check_tag.outputs.skip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Check if already released
        id: check_tag
        run: |
          VERSION=$(cat VERSION)
          TAG_EXISTS=$(git ls-remote --tags origin refs/tags/v${VERSION} | wc -l)
          if [ "$TAG_EXISTS" -gt "0" ]; then
            echo "Tag v${VERSION} already exists, skipping..."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify PR is from master branch
        if: steps.check_tag.outputs.skip == 'false'
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            if (pr.head.ref !== 'master') {
              core.setFailed(`PR must be from the master branch, but was from: ${pr.head.ref}`);
              process.exit(1);
            }

            console.log("PR is from master branch. Proceeding with release.");

      - name: Verify PR author is admin
        if: steps.check_tag.outputs.skip == 'false'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.pull_request.user.login
            });

            console.log(`PR author: ${context.payload.pull_request.user.login}`);
            console.log(`Permission level: ${permission.permission}`);

            if (permission.permission !== 'admin') {
              core.setFailed(`PR author ${context.payload.pull_request.user.login} does not have admin permission.`);
              process.exit(1);
            }

            console.log("PR author is authorized. Proceeding with release.");

  prepare:
    name: Prepare Release
    needs: check-source-branch
    if: needs.check-source-branch.outputs.skip == 'false'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      version: ${{ steps.read_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.tag_exists }}
      pr_title: ${{ steps.pr_data.outputs.title }}
      pr_body: ${{ steps.pr_data.outputs.body }}
      commit_log: ${{ steps.pr_data.outputs.commit_log }}
      contributors: ${{ steps.pr_data.outputs.contributors }}
      manual_notes: ${{ steps.manual_notes.outputs.notes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Read version from VERSION file
        id: read_version
        run: |
          version=$(cat VERSION)
          echo "Version: $version"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Check if version tag exists
        id: check_tag
        run: |
          TAG_EXISTS=$(git ls-remote --tags origin refs/tags/v${{ steps.read_version.outputs.version }} | wc -l)
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT

      - name: Extract manual Unreleased notes from changelog
        id: manual_notes
        run: |
          # The changelog's "## [Unreleased]" block holds hand-written notes
          # that carry context the bare commit log can't. Feed it to Gemini as
          # an authoritative draft. Block = lines between the 1st and 2nd '---'
          # separator; we drop the leading "## [Unreleased]..." heading so only
          # the body (### Added / ### Fixed bullets) reaches the prompt.
          NOTES=""
          if [ -f docs/changelog.md ]; then
            SEPS=$(grep -n '^---$' docs/changelog.md | head -2 | cut -d: -f1)
            START=$(echo "$SEPS" | sed -n '1p')
            END=$(echo "$SEPS" | sed -n '2p')
            if [ -n "$START" ] && [ -n "$END" ] && [ "$END" -gt "$START" ]; then
              NOTES=$(sed -n "$((START + 1)),$((END - 1))p" docs/changelog.md \
                | sed -E '/^## \[Unreleased\]/d' \
                | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba' -e '}')
            fi
          fi
          if [ -z "$NOTES" ]; then
            echo "::warning::No manual Unreleased notes found in docs/changelog.md."
          fi
          {
            echo "notes<<EOF_NOTES"
            printf '%s\n' "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Get PR Info and Commits
        id: pr_data
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput("title", pr.title);
            core.setOutput("body", pr.body || "No description");

            // Paginate so PRs with >30 commits (a release bundles many)
            // surface every commit + contributor, not just the first page.
            const commitList = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            const messages = commitList.map(c =>
              `- ${c.commit.message} (${c.commit.author.name})`
            );
            core.setOutput("commit_log", messages.join('\\n'));

            // Contributor credit list for the release body. Prefer the
            // GitHub @login (so it renders as a real mention/notification);
            // fall back to the git author name when the commit email isn't
            // linked to a GitHub account (login is null). Skip bots.
            const seen = new Set();
            const credits = [];
            for (const c of commitList) {
              const login = c.author && c.author.login;
              if (login) {
                if (/\[bot\]$/i.test(login) || login === 'github-actions') continue;
                const key = login.toLowerCase();
                if (seen.has(key)) continue;
                seen.add(key);
                credits.push('@' + login);
              } else {
                const name = c.commit.author.name;
                if (!name) continue;
                const key = 'name:' + name.toLowerCase();
                if (seen.has(key)) continue;
                seen.add(key);
                credits.push(name);
              }
            }
            core.setOutput("contributors", credits.join(', '));

  generate-summary:
    name: Generate Release Summary
    needs: prepare
    if: needs.prepare.outputs.tag_exists == '0'
    runs-on: ubuntu-latest

    outputs:
      summary: ${{ steps.ai_summary.outputs.summary }}
      title: ${{ steps.ai_summary.outputs.title }}
      headline: ${{ steps.ai_summary.outputs.headline }}

    steps:
      - name: Call Gemini to generate release summary
        id: ai_summary
        env:
          PR_TITLE: ${{ needs.prepare.outputs.pr_title }}
          PR_BODY: ${{ needs.prepare.outputs.pr_body }}
          COMMIT_LOG: ${{ needs.prepare.outputs.commit_log }}
          MANUAL_NOTES: ${{ needs.prepare.outputs.manual_notes }}
        run: |
          VERSION=v${{ needs.prepare.outputs.version }}

          if [ -z "${{ vars.GEMINI_MODEL }}" ] || [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::GEMINI_MODEL or GEMINI_API_KEY is missing."
            exit 1
          fi

          printf "%s\n" "$COMMIT_LOG" > commit_log.txt
          COMMITS=$(cat commit_log.txt)
          MANUAL=${MANUAL_NOTES:-"(none provided)"}

          PROMPT=$(printf "Release version: %s\n\nPull Request: %s\n\nDescription:\n%s\n\nMaintainer draft notes (hand-written, authoritative):\n%s\n\nCommits:\n%s\n\nYou are an agent responsible for generating GitHub release summaries. You are given THREE inputs: (1) maintainer draft notes hand-written for this release, (2) the raw commit log, (3) the PR description. The maintainer draft notes are authoritative — they capture intent and context the bare commit log lacks. Combine all three into one summary: start from the maintainer draft notes, then cross-check against the commits to catch anything the maintainer missed, fold in those extra items, and refine wording for clarity. Do not drop any item present in the maintainer draft notes. Output ONLY valid Markdown compatible with VitePress (no MDX, no HTML tags, no custom components, no frontmatter).\n\nThe FIRST line of your output MUST be a sentinel of the form:\n\nHEADLINE: <value>\n\nWhere <value> is ALWAYS 1 to 3 words naming the release — it must never be empty. Pick the headline by what the release touches:\n- When one major theme dominates, name it (e.g. 'AI Agents', 'Cross-Platform Builds', 'MCP & Connectors').\n- For a single bug-fix or small-improvement release, name the AREA or COMPONENT affected, not the act of fixing (e.g. a provider-storage / restore fix → 'Provider Storage'; an agent.md / agent runtime fix → 'Agents'; a workflow engine fix → 'Workflows'; a connector fix → 'Connectors'). Derive the area from the changed files / commit scope.\n- Only when several unrelated areas change with no dominant one, use a generic label like 'Maintenance' or 'Fixes & Improvements'.\nNever output an empty HEADLINE.\n\nAfter the HEADLINE sentinel line, leave one blank line, then output the summary body.\n\nFORMAT RULES for the summary body:\n- If the maintainer draft notes contain named sub-sections (lines starting with '### SomeFeatureName' followed by '#### Added' / '#### Fixed' etc.), PRESERVE that structure exactly. Each named sub-section becomes a '### FeatureName' heading, with '#### Added' / '#### Fixed' / '#### Changed' / '#### Improved' / '#### Removed' sub-headings beneath it, and bullet points under those.\n- If the maintainer draft notes use flat top-level headings only (### Added / ### Fixed / ### Improved with bullets directly under them), output in that same flat format.\n- Never collapse named sub-sections into a flat list — the per-feature grouping is intentional and must be kept.\n- Do not add introductory sentences, version headings, or trailing notes. Describe each item specifically and concisely. Professional tone suitable for public changelogs." "$VERSION" "$PR_TITLE" "$PR_BODY" "$MANUAL" "$COMMITS")

          PAYLOAD=$(jq -n --arg text "$PROMPT" '{"contents":[{"parts":[{"text":$text}]}]}')
          SUMMARY=""
          for ATTEMPT in 1 2 3 4 5; do
            echo "Attempt $ATTEMPT..."
            RESPONSE=$(curl -sS "https://generativelanguage.googleapis.com/v1beta/models/${{ vars.GEMINI_MODEL }}:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
              -H 'Content-Type: application/json' \
              -X POST \
              -d "$PAYLOAD" 2>&1) || true
            SUMMARY=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null || true)
            if [ -n "$SUMMARY" ] && [ "$SUMMARY" != "null" ]; then
              break
            fi
            RETRY_DELAY=$(echo "$RESPONSE" | jq -r '[.error.details[]? | select(."@type" == "type.googleapis.com/google.rpc.RetryInfo") | .retryDelay // "60s"] | first // "60s"' 2>/dev/null | tr -d 's' || echo "60")
            RETRY_DELAY=$(( ${RETRY_DELAY:-60} + 5 ))
            echo "::warning::Attempt $ATTEMPT failed. Waiting ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
          done

          if [ -z "$SUMMARY" ] || [ "$SUMMARY" = "null" ]; then
            echo "::error::Failed after 5 attempts."
            echo "Raw Response: $RESPONSE"
            exit 1
          fi

          # Parse HEADLINE sentinel from first line, strip it from body.
          # Tolerate Gemini wrapping output in a fenced code block (```markdown ... ```).
          FIRST_LINE=$(printf '%s' "$SUMMARY" | sed -n '1p')
          if printf '%s' "$FIRST_LINE" | grep -qE '^```'; then
            # Drop opening fence + trailing fence
            SUMMARY=$(printf '%s' "$SUMMARY" | sed -e '1d' -e '$d')
            FIRST_LINE=$(printf '%s' "$SUMMARY" | sed -n '1p')
          fi
          HEADLINE=""
          if printf '%s' "$FIRST_LINE" | grep -qE '^HEADLINE:'; then
            HEADLINE=$(printf '%s' "$FIRST_LINE" | sed -E 's/^HEADLINE:[[:space:]]*//' | sed -E 's/[[:space:]]+$//')
            # Strip the sentinel line + the blank line that should follow it.
            SUMMARY=$(printf '%s' "$SUMMARY" | sed -e '1d' -e '/./,$!d')
            echo "Parsed headline: '$HEADLINE'"
          else
            echo "::warning::Gemini output missing HEADLINE sentinel — proceeding with empty headline."
          fi

          # HEADLINE is mandatory now. If Gemini still returned it empty,
          # fall back to a generic label so the title is never bare.
          if [ -z "$HEADLINE" ]; then
            HEADLINE="Fixes & Improvements"
            echo "::warning::Empty HEADLINE — falling back to '$HEADLINE'."
          fi
          echo "title=${VERSION} — ${HEADLINE}" >> $GITHUB_OUTPUT
          echo "headline=$HEADLINE" >> $GITHUB_OUTPUT
          echo "summary<<EOF_SUMMARY" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF_SUMMARY" >> $GITHUB_OUTPUT

          rm -f commit_log.txt

  sync-and-tag:
    name: Sync Docs and Tag
    needs: [prepare, generate-summary]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      branch: ${{ steps.push.outputs.branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Sync go.mod.tmpl and docs/changelog.md
        env:
          SUMMARY: ${{ needs.generate-summary.outputs.summary }}
          HEADLINE: ${{ needs.generate-summary.outputs.headline }}
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          sed -i "s|github.com/yogasw/wick v.*|github.com/yogasw/wick v${VERSION}|" template/go.mod.tmpl
          grep -rl "github.com/yogasw/wick@" docs/ template/ | xargs sed -i "s|github.com/yogasw/wick@[^ \"'\`]*|github.com/yogasw/wick@v${VERSION}|g"

          if [ -f docs/changelog.md ]; then
            docs_tempfile=$(mktemp)
            REPO="yogasw/wick"

            # Layout: title/intro, '---' (#1), "## [Unreleased]" manual block,
            # '---' (#2), then prior releases. The manual block's content has
            # already been folded into $SUMMARY by Gemini, so on release we:
            #   1. keep the title/intro through separator #1,
            #   2. drop the consumed Unreleased block and reset it to an empty
            #      scaffold for the next cycle,
            #   3. insert the new "## [vX.Y.Z]" release entry,
            #   4. keep every prior release (everything after separator #2).
            SEPS=$(grep -n '^---$' docs/changelog.md | head -2 | cut -d: -f1)
            HEAD_END=$(echo "$SEPS" | sed -n '1p')
            BLOCK_END=$(echo "$SEPS" | sed -n '2p')
            # Fall back to single-separator behavior if no Unreleased block.
            if [ -z "$BLOCK_END" ]; then BLOCK_END=$HEAD_END; fi

            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^v${VERSION}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              COMPARE_URL="https://github.com/${REPO}/compare/${PREV_TAG}...v${VERSION}"
            else
              COMPARE_URL="https://github.com/${REPO}/releases/tag/v${VERSION}"
            fi

            # Append " — <headline>" to the heading when Gemini named one.
            HEADING_SUFFIX=""
            if [ -n "$HEADLINE" ]; then
              HEADING_SUFFIX=" — ${HEADLINE}"
            fi

            head -n "$HEAD_END" docs/changelog.md > "$docs_tempfile"
            {
              echo ""
              echo "## [Unreleased]"
              echo ""
              echo "_Nothing yet — notes for the next release go here._"
              echo ""
              echo "---"
              echo ""
              echo "## [v${VERSION}](${COMPARE_URL})${HEADING_SUFFIX}"
              echo ""
              echo "_Released on $(date +'%Y-%m-%d')_"
              echo ""
              printf '%s\n' "$SUMMARY"
              echo ""
              echo "---"
              echo ""
              tail -n +$((BLOCK_END + 1)) docs/changelog.md
            } >> "$docs_tempfile"
            mv "$docs_tempfile" docs/changelog.md
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install templ
        run: |
          TEMPL_VERSION=$(go list -m -f '{{.Version}}' github.com/a-h/templ)
          echo "Using templ $TEMPL_VERSION (matches go.mod)"
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}

      - name: Setup Tailwind CLI
        run: |
          mkdir -p bin web/public/js web/public/css
          curl -sSL -o bin/tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.17/tailwindcss-linux-x64
          chmod +x bin/tailwindcss

      - name: Setup Node (for FE workflow SPA)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install FE deps
        working-directory: fe
        run: npm ci

      - name: Commit, tag, and push
        id: push
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          BRANCH=release-sync/v${VERSION}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -b $BRANCH origin/master

          # Sync commit (clean, no generated files) — basis for branch + PR back to master
          git add template/go.mod.tmpl docs/
          git commit -m "chore: sync go.mod.tmpl and docs for v${VERSION}" || true

          # Push clean branch first so PR back to master stays generated-file-free
          git push origin $BRANCH

          # Generate templ + tailwind + every Vite SPA workspace under fe/ so
          # `go install github.com/yogasw/wick@vX.Y.Z` ships a working binary.
          # All outputs are gitignored on master and only baked into the tag
          # commit. `npm run build` runs `build` in every workspace that has
          # one — drop a new app under fe/agents/* and it auto-joins the
          # release without touching this workflow.
          templ generate ./...
          ./bin/tailwindcss -i web/src/input.css -o web/public/css/app.css --minify
          (cd fe && npm run build)

          # Extra commit on detached state carrying generated files, then tag it.
          # The dist/ glob covers every Go host that ships a Vite SPA by scanning
          # the whole internal/ tree for a `dist` dir — convention is `//go:embed
          # all:dist` next to a `dist/.gitkeep`. Add a new tool or host with its
          # own SPA anywhere under internal/ and it joins the tag bundle without
          # touching this workflow.
          git add -f \
            $(find . -name '*_templ.go' -not -path './vendor/*') \
            web/public/css/app.css \
            $(find internal -type d -name dist 2>/dev/null)
          git commit -m "chore: bundle generated templ + css + spa for v${VERSION}"
          git tag v${VERSION}
          git push origin v${VERSION}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    needs: [prepare, generate-summary, sync-and-tag]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Build release body with contributor credits
        id: body
        env:
          SUMMARY: ${{ needs.generate-summary.outputs.summary }}
          CONTRIBUTORS: ${{ needs.prepare.outputs.contributors }}
        run: |
          {
            printf '%s\n' "$SUMMARY"
            if [ -n "$CONTRIBUTORS" ]; then
              echo ""
              echo "## Contributors"
              echo ""
              echo "Thanks to everyone who contributed to this release: ${CONTRIBUTORS} 🎉"
            fi
          } > release_body.md
          {
            echo "body<<EOF_BODY"
            cat release_body.md
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"
          rm -f release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: ${{ needs.generate-summary.outputs.title }}
          body: ${{ steps.body.outputs.body }}

  merge-to-master:
    name: Merge to Master
    needs: [prepare, sync-and-tag, create-release]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR and merge to master
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          BRANCH=${{ needs.sync-and-tag.outputs.branch }}
          PR_URL=$(gh pr create \
            --title "chore: sync go.mod.tmpl and docs for v${VERSION}" \
            --body "" \
            --base master \
            --head $BRANCH \
            --repo yogasw/wick)
          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          gh api repos/yogasw/wick/pulls/$PR_NUMBER/merge \
            --method PUT \
            --field merge_method=squash \
            --field commit_title="chore: sync go.mod.tmpl and docs for v${VERSION}"
          gh api repos/yogasw/wick/git/refs/heads/release-sync/v${VERSION} \
            --method DELETE

      - name: Merge trigger PR to release
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          echo "Updating branch for PR #$PR_NUMBER..."
          gh api repos/yogasw/wick/pulls/$PR_NUMBER/update-branch \
            --method PUT || true

          sleep 15

          for i in 1 2 3; do
            echo "Merge attempt $i..."
            gh api repos/yogasw/wick/pulls/$PR_NUMBER/merge \
              --method PUT \
              --field merge_method=merge \
              --field commit_title="chore: release v${{ needs.prepare.outputs.version }}" && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done