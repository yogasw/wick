name: Release

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened]

jobs:
  check-source-branch:
    name: Validate PR Source Branch
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify PR is from master branch
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            if (pr.head.ref !== 'master') {
              core.setFailed(`PR must be from the master branch, but was from: ${pr.head.ref}`);
              process.exit(1);
            }

            console.log("PR is from master branch. Proceeding with release.");

  release:
    name: Release
    needs: check-source-branch
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: read_version
        run: |
          version=$(cat VERSION)
          echo "Version: $version"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Check if version tag exists
        id: check_tag
        run: |
          TAG_EXISTS=$(git ls-remote --tags origin refs/tags/v${{ steps.read_version.outputs.version }} | wc -l)
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT

      - name: Exit if tag already exists
        if: steps.check_tag.outputs.tag_exists != '0'
        run: |
          echo "Version v${{ steps.read_version.outputs.version }} already released. Skipping."
          exit 0

      - name: Get PR Info and Commits
        id: pr_data
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput("title", pr.title);
            core.setOutput("body", pr.body || "No description");

            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const messages = commits.data.map(c =>
              `- ${c.commit.message} (${c.commit.author.name})`
            );
            core.setOutput("commit_log", messages.join('\\n'));

      - name: Call Gemini to generate release summary
        id: ai_summary
        env:
          PR_TITLE: ${{ steps.pr_data.outputs.title }}
          PR_BODY: ${{ steps.pr_data.outputs.body }}
          COMMIT_LOG: ${{ steps.pr_data.outputs.commit_log }}
        run: |
          VERSION=v${{ steps.read_version.outputs.version }}

          if [ -z "${{ vars.GEMINI_MODEL }}" ] || [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::GEMINI_MODEL or GEMINI_API_KEY is missing."
            exit 1
          fi

          printf "%s\n" "$COMMIT_LOG" > commit_log.txt
          COMMITS=$(cat commit_log.txt)

          PROMPT=$(printf "Release version: %s\n\nPull Request: %s\n\nDescription:\n%s\n\nCommits:\n%s\n\nYou are an agent responsible for generating GitHub release summaries from pull request commits. Output ONLY valid Markdown compatible with VitePress (no MDX, no HTML tags, no custom components, no frontmatter). Use only these heading levels: ### Added, ### Fixed, ### Improved — include only categories present in the commits. Under each heading use bullet points starting with '- '. Do not add introductory sentences, version headings, or trailing notes. Describe each item specifically and concisely. Professional tone suitable for public changelogs." "$VERSION" "$PR_TITLE" "$PR_BODY" "$COMMITS")

          RESPONSE=$(curl -sS "https://generativelanguage.googleapis.com/v1beta/models/${{ vars.GEMINI_MODEL }}:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d '{
              "contents": [{
                "parts": [{"text": '"$(jq -Rs <<< "$PROMPT")"'}]
              }]
            }' 2>&1) || true

          SUMMARY=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null || true)

          if [ -z "$SUMMARY" ] || [ "$SUMMARY" = "null" ]; then
            echo "::error::Failed to generate summary from Gemini."
            echo "Raw Response: $RESPONSE"
            exit 1
          fi

          echo "title=$VERSION" >> $GITHUB_OUTPUT
          echo "summary<<EOF_SUMMARY" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "*This summary was automatically generated by Gemini AI*" >> $GITHUB_OUTPUT
          echo "EOF_SUMMARY" >> $GITHUB_OUTPUT

      - name: Sync go.mod.tmpl and update CHANGELOG.md
        env:
          SUMMARY: ${{ steps.ai_summary.outputs.summary }}
        run: |
          VERSION=${{ steps.read_version.outputs.version }}
          sed -i "s|github.com/yogasw/wick v.*|github.com/yogasw/wick v${VERSION}|" template/go.mod.tmpl
          grep -rl "github.com/yogasw/wick@" docs/ | xargs sed -i "s|github.com/yogasw/wick@[^ \"'\`]*|github.com/yogasw/wick@v${VERSION}|g"

          # Update docs/changelog.md - insert new entry after the first --- separator
          if [ -f docs/changelog.md ]; then
            docs_tempfile=$(mktemp)
            SEPARATOR_LINE=$(grep -n '^---$' docs/changelog.md | head -1 | cut -d: -f1)
            REPO="yogasw/wick"

            # Get previous tag for compare link
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^v${VERSION}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              COMPARE_URL="https://github.com/${REPO}/compare/${PREV_TAG}...v${VERSION}"
            else
              COMPARE_URL="https://github.com/${REPO}/releases/tag/v${VERSION}"
            fi

            head -n "$SEPARATOR_LINE" docs/changelog.md > "$docs_tempfile"
            {
              echo ""
              echo "## [v${VERSION}](${COMPARE_URL})"
              echo ""
              echo "_Released on $(date +'%Y-%m-%d')_"
              echo ""
              printf '%s\n' "$SUMMARY"
              echo ""
              echo "---"
              echo ""
              tail -n +$((SEPARATOR_LINE + 1)) docs/changelog.md
            } >> "$docs_tempfile"
            mv "$docs_tempfile" docs/changelog.md
          fi

          rm -f commit_log.txt

      - name: Commit sync changes and create tag
        run: |
          VERSION=${{ steps.read_version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -b release-sync/v${VERSION} origin/master
          git add template/go.mod.tmpl docs/
          git commit -m "chore: sync go.mod.tmpl and CHANGELOG for v${VERSION}" || true
          git tag v${VERSION}
          git push origin release-sync/v${VERSION}
          git push origin v${VERSION}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ steps.read_version.outputs.version }}
          name: ${{ steps.ai_summary.outputs.title }}
          body: ${{ steps.ai_summary.outputs.summary }}

      - name: Create, approve, and merge PR to master
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          VERSION=${{ steps.read_version.outputs.version }}
          PR_URL=$(gh pr create \
            --title "chore: sync go.mod.tmpl and docs for v${VERSION}" \
            --body "" \
            --base master \
            --head release-sync/v${VERSION})
          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          gh pr merge "$PR_NUMBER" --squash --delete-branch --admin
