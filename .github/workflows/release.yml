name: Release

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened]

jobs:
  check-source-branch:
    name: Validate PR Source Branch
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify PR is from master branch
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            if (pr.head.ref !== 'master') {
              core.setFailed(`PR must be from the master branch, but was from: ${pr.head.ref}`);
              process.exit(1);
            }

            console.log("PR is from master branch. Proceeding with release.");

  prepare:
    name: Prepare Release
    needs: check-source-branch
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      version: ${{ steps.read_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.tag_exists }}
      pr_title: ${{ steps.pr_data.outputs.title }}
      pr_body: ${{ steps.pr_data.outputs.body }}
      commit_log: ${{ steps.pr_data.outputs.commit_log }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Read version from VERSION file
        id: read_version
        run: |
          version=$(cat VERSION)
          echo "Version: $version"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Check if version tag exists
        id: check_tag
        run: |
          TAG_EXISTS=$(git ls-remote --tags origin refs/tags/v${{ steps.read_version.outputs.version }} | wc -l)
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT

      - name: Get PR Info and Commits
        id: pr_data
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput("title", pr.title);
            core.setOutput("body", pr.body || "No description");

            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const messages = commits.data.map(c =>
              `- ${c.commit.message} (${c.commit.author.name})`
            );
            core.setOutput("commit_log", messages.join('\\n'));

  generate-summary:
    name: Generate Release Summary
    needs: prepare
    if: needs.prepare.outputs.tag_exists == '0'
    runs-on: ubuntu-latest

    outputs:
      summary: ${{ steps.ai_summary.outputs.summary }}
      title: ${{ steps.ai_summary.outputs.title }}

    steps:
      - name: Call Gemini to generate release summary
        id: ai_summary
        env:
          PR_TITLE: ${{ needs.prepare.outputs.pr_title }}
          PR_BODY: ${{ needs.prepare.outputs.pr_body }}
          COMMIT_LOG: ${{ needs.prepare.outputs.commit_log }}
        run: |
          VERSION=v${{ needs.prepare.outputs.version }}

          if [ -z "${{ vars.GEMINI_MODEL }}" ] || [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::GEMINI_MODEL or GEMINI_API_KEY is missing."
            exit 1
          fi

          printf "%s\n" "$COMMIT_LOG" > commit_log.txt
          COMMITS=$(cat commit_log.txt)

          PROMPT=$(printf "Release version: %s\n\nPull Request: %s\n\nDescription:\n%s\n\nCommits:\n%s\n\nYou are an agent responsible for generating GitHub release summaries from pull request commits. Output ONLY valid Markdown compatible with VitePress (no MDX, no HTML tags, no custom components, no frontmatter). Use only these heading levels: ### Added, ### Fixed, ### Improved — include only categories present in the commits. Under each heading use bullet points starting with '- '. Do not add introductory sentences, version headings, or trailing notes. Describe each item specifically and concisely. Professional tone suitable for public changelogs." "$VERSION" "$PR_TITLE" "$PR_BODY" "$COMMITS")

          PAYLOAD=$(jq -n --arg text "$PROMPT" '{"contents":[{"parts":[{"text":$text}]}]}')
          MAX_RETRIES=5
          ATTEMPT=0
          SUMMARY=""

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT..."

            RESPONSE=$(curl -sS "https://generativelanguage.googleapis.com/v1beta/models/${{ vars.GEMINI_MODEL }}:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
              -H 'Content-Type: application/json' \
              -X POST \
              -d "$PAYLOAD" 2>&1) || true

            SUMMARY=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null || true)

            if [ -n "$SUMMARY" ] && [ "$SUMMARY" != "null" ]; then
              break
            fi

            RETRY_DELAY=$(echo "$RESPONSE" | jq -r '[.error.details[]? | select(."@type" == "type.googleapis.com/google.rpc.RetryInfo") | .retryDelay // "0s"] | first // "0s"' 2>/dev/null | tr -d 's' || true)
            RETRY_DELAY=${RETRY_DELAY:-60}
            RETRY_DELAY=$((RETRY_DELAY + 5))

            echo "::warning::Attempt $ATTEMPT failed. Waiting ${RETRY_DELAY}s before retry..."
            echo "Raw Response: $RESPONSE"
            sleep "$RETRY_DELAY"
          done

          if [ -z "$SUMMARY" ] || [ "$SUMMARY" = "null" ]; then
            echo "::error::Failed after $MAX_RETRIES attempts."
            exit 1
          fi

          echo "title=$VERSION" >> $GITHUB_OUTPUT
          echo "summary<<EOF_SUMMARY" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "*This summary was automatically generated by Gemini AI*" >> $GITHUB_OUTPUT
          echo "EOF_SUMMARY" >> $GITHUB_OUTPUT

          rm -f commit_log.txt

  sync-and-tag:
    name: Sync Docs and Tag
    needs: [prepare, generate-summary]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      branch: ${{ steps.push.outputs.branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Sync go.mod.tmpl and docs/changelog.md
        env:
          SUMMARY: ${{ needs.generate-summary.outputs.summary }}
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          sed -i "s|github.com/yogasw/wick v.*|github.com/yogasw/wick v${VERSION}|" template/go.mod.tmpl
          grep -rl "github.com/yogasw/wick@" docs/ | xargs sed -i "s|github.com/yogasw/wick@[^ \"'\`]*|github.com/yogasw/wick@v${VERSION}|g"

          if [ -f docs/changelog.md ]; then
            docs_tempfile=$(mktemp)
            SEPARATOR_LINE=$(grep -n '^---$' docs/changelog.md | head -1 | cut -d: -f1)
            REPO="yogasw/wick"

            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^v${VERSION}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              COMPARE_URL="https://github.com/${REPO}/compare/${PREV_TAG}...v${VERSION}"
            else
              COMPARE_URL="https://github.com/${REPO}/releases/tag/v${VERSION}"
            fi

            head -n "$SEPARATOR_LINE" docs/changelog.md > "$docs_tempfile"
            {
              echo ""
              echo "## [v${VERSION}](${COMPARE_URL})"
              echo ""
              echo "_Released on $(date +'%Y-%m-%d')_"
              echo ""
              printf '%s\n' "$SUMMARY"
              echo ""
              echo "---"
              echo ""
              tail -n +$((SEPARATOR_LINE + 1)) docs/changelog.md
            } >> "$docs_tempfile"
            mv "$docs_tempfile" docs/changelog.md
          fi

      - name: Commit, tag, and push
        id: push
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          BRANCH=release-sync/v${VERSION}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -b $BRANCH origin/master
          git add template/go.mod.tmpl docs/
          git commit -m "chore: sync go.mod.tmpl and docs for v${VERSION}" || true
          git tag v${VERSION}
          git push origin $BRANCH
          git push origin v${VERSION}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    needs: [prepare, generate-summary, sync-and-tag]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: ${{ needs.generate-summary.outputs.title }}
          body: ${{ needs.generate-summary.outputs.summary }}

  merge-to-master:
    name: Merge to Master
    needs: [prepare, sync-and-tag, create-release]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR and merge to master
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          BRANCH=${{ needs.sync-and-tag.outputs.branch }}
          PR_URL=$(gh pr create \
            --title "chore: sync go.mod.tmpl and docs for v${VERSION}" \
            --body "" \
            --base master \
            --head $BRANCH \
            --repo yogasw/wick)
          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          gh api repos/yogasw/wick/pulls/$PR_NUMBER/merge \
            --method PUT \
            --field merge_method=squash \
            --field commit_title="chore: sync go.mod.tmpl and docs for v${VERSION}"
          gh api repos/yogasw/wick/git/refs/heads/release-sync/v${VERSION} \
            --method DELETE
