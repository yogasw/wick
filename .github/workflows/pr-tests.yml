name: PR Tests

on:
  # Auto-run on every PR is DISABLED — the mandatory test gate moved to
  # local pre-push (.githooks/pre-push) + the release pipeline. Kept as a
  # manual escape hatch (run from the Actions tab). To re-enable per-PR CI,
  # delete workflow_dispatch and uncomment the pull_request block below.
  workflow_dispatch:
  # pull_request:
  #   types: [opened, synchronize, reopened]
  #   branches-ignore:
  #     - release
  #   paths:
  #     - '**.go'
  #     - '**.templ'
  #     - 'go.mod'
  #     - 'go.sum'
  #     - 'fe/**'
  #     - '.github/workflows/pr-tests.yml'

jobs:
  # Detect which area changed so the Go and FE jobs only run when their
  # files were touched — a Go-only PR skips the FE build and vice versa,
  # even though the workflow triggers on both path sets.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'release-sync/v') }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      fe: ${{ steps.filter.outputs.fe }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - '**.templ'
              - 'go.mod'
              - 'go.sum'
            fe:
              - 'fe/**'

  unit-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need the merge-base with the PR base to diff changed packages.
          fetch-depth: 0

      - name: Set up Go
        id: go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Restore Go build cache
        # Warmed on master by ci-cache-warm.yml. Per-branch cache scope
        # means a PR can only READ master's cache (the default branch) +
        # its own. restore-keys falls back to the newest master build
        # cache when go.sum differs, so a dep bump still gets a warm start.
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ steps.go.outputs.go-version }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-build-${{ steps.go.outputs.go-version }}-

      - name: Resolve templ version from go.mod
        id: templ
        run: echo "version=$(go list -m -f '{{.Version}}' github.com/a-h/templ)" >> $GITHUB_OUTPUT

      - name: Cache templ binary
        id: cache-templ
        uses: actions/cache@v4
        with:
          path: ~/go/bin/templ
          # Key on the pinned templ version, not hashFiles('go.sum') — the
          # old key invalidated on every PR that touched any dep, even
          # though templ itself was stable for hundreds of commits. Warmed
          # on master so every PR hits it.
          key: templ-${{ steps.go.outputs.go-version }}-${{ steps.templ.outputs.version }}

      - name: Install templ (version pinned to go.mod)
        if: steps.cache-templ.outputs.cache-hit != 'true'
        run: |
          echo "Using templ ${{ steps.templ.outputs.version }}"
          go install github.com/a-h/templ/cmd/templ@${{ steps.templ.outputs.version }}

      - name: Generate templ files
        run: templ generate ./...

      - name: Build
        run: go build ./internal/... ./cmd/... ./pkg/...

      # Two-tier test strategy to keep PR CI fast as the suite grows:
      #   1. Full suite WITHOUT -race — fast, covers all logic.
      #   2. -race ONLY on packages changed in this PR — the race detector
      #      is the dominant cost (~3-10x slower); running it everywhere on
      #      every PR doesn't scale. Changed packages are where new races
      #      are introduced; master's warm path + nightly can cover the rest.
      - name: Run unit tests
        run: go test -count=1 -timeout 10m ./internal/... ./cmd/... ./pkg/...

      - name: Run race detector on changed packages
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" 2>/dev/null || true
          # Map changed .go files -> their package import paths.
          changed=$(git diff --name-only "$base"...HEAD -- '*.go' \
            | xargs -r -n1 dirname | sort -u \
            | sed 's#^#./#' \
            | grep -E '^\./(internal|cmd|pkg)/' || true)
          if [ -z "$changed" ]; then
            echo "No changed Go packages — skipping race pass."
            exit 0
          fi
          echo "Race-testing changed packages:"
          echo "$changed"
          # Only test dirs that actually contain Go test files / build.
          go test -race -count=1 -timeout 10m $changed

  fe-build:
    name: FE Build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.fe == 'true' }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Caches the npm download store keyed on the lockfile.
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Cache Vite build cache
        uses: actions/cache@v4
        with:
          path: fe/node_modules/.vite
          key: vite-${{ hashFiles('fe/package-lock.json') }}-${{ hashFiles('fe/**/*.svelte', 'fe/**/*.ts') }}
          restore-keys: |
            vite-${{ hashFiles('fe/package-lock.json') }}-

      - name: Install deps
        working-directory: fe
        run: npm ci

      - name: Build SPAs
        working-directory: fe
        run: npm run build
