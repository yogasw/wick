name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - release
    paths:
      - '**.go'
      - '**.templ'
      - 'go.mod'
      - 'go.sum'

jobs:
  unit-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'release-sync/v') }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        id: go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Cache templ binary
        id: cache-templ
        uses: actions/cache@v4
        with:
          path: ~/go/bin/templ
          key: templ-${{ steps.go.outputs.go-version }}-${{ hashFiles('go.sum') }}

      - name: Install templ (version pinned to go.mod)
        if: steps.cache-templ.outputs.cache-hit != 'true'
        run: |
          TEMPL_VERSION=$(go list -m -f '{{.Version}}' github.com/a-h/templ)
          echo "Using templ $TEMPL_VERSION"
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}

      - name: Generate templ files
        run: templ generate ./...

      - name: Build
        run: go build ./internal/... ./cmd/... ./pkg/...

      - name: Run unit tests
        run: go test -race -timeout 10m ./internal/... ./cmd/... ./pkg/...
