name: Deploy Docs and Sync pkg.go.dev

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare npm cache dir
        run: mkdir -p ~/.npm

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build VitePress
        working-directory: docs
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy-docs:
    name: Deploy Docs
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-pkg:
    name: Sync to pkg.go.dev
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Trigger pkg.go.dev sync
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Syncing $VERSION..."
          curl -s "https://pkg.go.dev/github.com/yogasw/wick@${VERSION}" > /dev/null
          curl -s "https://sum.golang.org/lookup/github.com/yogasw/wick@${VERSION}" > /dev/null
          echo "Synced $VERSION to pkg.go.dev"