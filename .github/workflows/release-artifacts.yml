name: Release Artifacts

# Repo Variables (Settings → Secrets and variables → Actions → Variables)
#
#   BUILD_BINARIES   true/false   master switch (default: true)
#                    false → every binary target is disabled
#   BUILD_TARGETS    comma-separated <os>/<arch> to build
#                    valid: linux/amd64, linux/arm64, darwin/amd64,
#                           darwin/arm64, windows/amd64, windows/arm64
#                    default: darwin/amd64,darwin/arm64,windows/amd64
#                    special: "all" → build everything
#                    example: linux/amd64,windows/amd64
#
#   BUILD_DOCKER     true/false   (default: true)
#   DOCKER_PLATFORM  linux/<arch> (default: linux/arm64)
#
# Targets NOT in BUILD_TARGETS still spawn a job — the first step writes
# a DISABLED notice to the run summary and the rest are skipped — so
# disabled targets stay visible in Actions history.
#
# Self-updater: enabled by default (wick is a public repo). Anonymous
# GitHub API is used to check for updates. To raise the rate limit or
# support a private releases repo, set repo Secret
# RELEASE_GITHUB_DOWNLOAD_PAT (fine-grained PAT, Contents=Read).

on:
  push:
    tags:
      - 'v*'

# Shared concurrency group across ALL wick release workflows (core + plugin +
# this) so only one runs at a time globally — nothing else touches the caches
# (delete+save) concurrently. cancel-in-progress: false → queue, don't abort a
# release mid-flight.
concurrency:
  group: wick-workflow
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # gh cache delete (refresh cache under stable key)
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      # Stable cache key 'wick-cli-linux' (no tag — per-tag keys just pile up and
      # never get reused). The install ALWAYS runs (not gated on cache-hit) so the
      # binary always matches THIS tag; the cache is then refreshed under the same
      # key (delete old, save new). Restore is only a warm hint here.
      - name: Restore wick CLI binary
        uses: actions/cache/restore@v4
        with:
          path: ~/go/bin/wick
          key: wick-cli-linux

      - name: Install wick CLI
        run: go install github.com/yogasw/wick@${{ github.ref_name }}

      - name: Refresh wick CLI cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache delete wick-cli-linux --repo "${{ github.repository }}" || true
      - name: Save wick CLI binary
        uses: actions/cache/save@v4
        with:
          path: ~/go/bin/wick
          key: wick-cli-linux

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Init project
        run: wick init wick-agent --skip-setup
        working-directory: /tmp

      - name: Upload wick CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: wick-cli-linux
          path: ~/go/bin/wick
          retention-days: 1

      - name: Upload project scaffold
        uses: actions/upload-artifact@v4
        with:
          name: wick-agent-scaffold
          path: /tmp/wick-agent
          retention-days: 1

  build-binaries:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      actions: write # gh cache delete (macOS wick-cli refresh)

    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64, runner: ubuntu-latest }
          - { os: linux,   arch: arm64, runner: ubuntu-latest }
          - { os: darwin,  arch: amd64, runner: macos-latest, cgo: "1" }
          - { os: darwin,  arch: arm64, runner: macos-latest, cgo: "1" }
          - { os: windows, arch: amd64, runner: ubuntu-latest }
          - { os: windows, arch: arm64, runner: ubuntu-latest }

    steps:
      - name: Check target enabled
        id: gate
        shell: bash
        env:
          BUILD_BINARIES: ${{ vars.BUILD_BINARIES }}
          TARGETS: ${{ vars.BUILD_TARGETS }}
        run: |
          TARGET="${{ matrix.os }}/${{ matrix.arch }}"
          # Defaults when vars are unset.
          : "${BUILD_BINARIES:=true}"
          : "${TARGETS:=darwin/amd64,darwin/arm64,windows/amd64}"

          # Master switch first — short-circuit to disabled with its own message.
          if [ "$BUILD_BINARIES" = "false" ]; then
            {
              echo "## ⏭️ DISABLED — $TARGET (BUILD_BINARIES=false)"
              echo ""
              echo "Binary builds are turned off by the master switch."
              echo ""
              echo "Settings → Secrets and variables → Actions → Variables → BUILD_BINARIES"
              echo ""
              echo "| Name | Value |"
              echo "|------|-------|"
              echo "| \`BUILD_BINARIES\` | \`true\` |"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=DISABLED::Binary builds turned off (BUILD_BINARIES=false)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$TARGETS" = "all" ]; then
            MATCH=true
          else
            # Comma-separated exact match. Strip spaces, wrap in commas to
            # avoid partial matches (e.g. amd64 hitting arm64).
            CLEAN=",$(echo "$TARGETS" | tr -d ' '),"
            case "$CLEAN" in
              *",$TARGET,"*) MATCH=true ;;
              *)             MATCH=false ;;
            esac
          fi
          if [ "$MATCH" != "true" ]; then
            {
              echo "## ⏭️ DISABLED — $TARGET"
              echo ""
              echo "This target is not in \`BUILD_TARGETS\` (currently: \`$TARGETS\`)."
              echo ""
              echo "To release it, add \`$TARGET\` to repo variable \`BUILD_TARGETS\`:"
              echo ""
              echo "Settings → Secrets and variables → Actions → Variables → BUILD_TARGETS"
              echo ""
              echo "| Name | Value |"
              echo "|------|-------|"
              echo "| \`BUILD_TARGETS\` | \`$TARGETS,$TARGET\` |"
              echo ""
              echo "Or set to \`all\` to build everything."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=DISABLED::$TARGET not in BUILD_TARGETS ($TARGETS) — add it to enable."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=ENABLED::$TARGET will be built and attached to release."
          fi

      - name: Download wick CLI binary
        if: steps.gate.outputs.enabled == 'true' && matrix.runner == 'ubuntu-latest'
        uses: actions/download-artifact@v4
        with:
          name: wick-cli-linux
          path: /usr/local/bin

      - name: Make wick executable (linux)
        if: steps.gate.outputs.enabled == 'true' && matrix.runner == 'ubuntu-latest'
        run: chmod +x /usr/local/bin/wick

      - name: Setup Go (macOS only — needed for go install)
        if: steps.gate.outputs.enabled == 'true' && matrix.runner == 'macos-latest'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      # Stable per-arch key 'wick-cli-darwin-<arch>' (no tag — per-tag piles up).
      # Per-arch so the two macOS legs (amd64/arm64) write DIFFERENT keys and
      # never race. Install ALWAYS runs so the binary matches this tag; cache is
      # refreshed under the same key after.
      - name: Restore wick CLI binary (macOS)
        if: steps.gate.outputs.enabled == 'true' && matrix.runner == 'macos-latest'
        uses: actions/cache/restore@v4
        with:
          path: ~/go/bin/wick
          key: wick-cli-darwin-${{ matrix.arch }}

      - name: Install wick CLI (macOS)
        if: steps.gate.outputs.enabled == 'true' && matrix.runner == 'macos-latest'
        run: go install github.com/yogasw/wick@${{ github.ref_name }}

      - name: Refresh wick CLI cache (macOS)
        if: steps.gate.outputs.enabled == 'true' && matrix.runner == 'macos-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache delete "wick-cli-darwin-${{ matrix.arch }}" --repo "${{ github.repository }}" || true
      - name: Save wick CLI binary (macOS)
        if: steps.gate.outputs.enabled == 'true' && matrix.runner == 'macos-latest'
        uses: actions/cache/save@v4
        with:
          path: ~/go/bin/wick
          key: wick-cli-darwin-${{ matrix.arch }}

      - name: Add Go bin to PATH (macOS)
        if: steps.gate.outputs.enabled == 'true' && matrix.runner == 'macos-latest'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Download project scaffold
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: wick-agent-scaffold
          path: /tmp/wick-agent

      - name: Cache wixl (windows cross-compile)
        if: steps.gate.outputs.enabled == 'true' && matrix.os == 'windows'
        id: cache-wixl
        uses: actions/cache@v4
        with:
          path: /usr/bin/wixl
          key: wixl-apt-${{ runner.os }}

      - name: Install wixl (windows cross-compile)
        if: steps.gate.outputs.enabled == 'true' && matrix.os == 'windows' && steps.cache-wixl.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y wixl

      - name: Setup
        if: steps.gate.outputs.enabled == 'true'
        run: wick setup
        working-directory: /tmp/wick-agent

      - name: Add Go bin to PATH (ubuntu)
        if: steps.gate.outputs.enabled == 'true' && matrix.runner == 'ubuntu-latest'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build installer
        if: steps.gate.outputs.enabled == 'true'
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.cgo || '0' }}
          APP_VERSION: ${{ github.ref_name }}
          # Self-updater config baked into binary.
          # Public repo → PAT empty is fine (anonymous GitHub API, 60 req/h).
          # Set repo secret RELEASE_GITHUB_DOWNLOAD_PAT for 5000 req/h or a
          # private releases repo.
          RELEASE_GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_GITHUB_PAT: ${{ secrets.RELEASE_GITHUB_DOWNLOAD_PAT }}
        run: wick build --installer
        working-directory: /tmp/wick-agent

      - name: Resolve asset name
        if: steps.gate.outputs.enabled == 'true'
        id: meta
        shell: bash
        working-directory: /tmp/wick-agent
        # Installer asset is always uploaded. For linux targets we ALSO
        # upload the raw binary (`<app>-linux-<arch>`) so install.sh can
        # serve Termux and dpkg-less Linux hosts that need the bare
        # executable.
        run: |
          NAME=$(grep '^name:' wick.yml | awk '{print $2}' | tr -d '"'"'"' ')
          VERSION=${GITHUB_REF_NAME#v}
          case "${{ matrix.os }}" in
            windows) EXT="msi" ;;
            darwin)  EXT="dmg" ;;
            linux)   EXT="deb" ;;
          esac
          ASSET="${NAME}-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.${EXT}"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "asset_path=/tmp/wick-agent/bin/$ASSET" >> "$GITHUB_OUTPUT"
          if [ "${{ matrix.os }}" = "linux" ]; then
            RAW="${NAME}-linux-${{ matrix.arch }}"
            echo "raw=$RAW" >> "$GITHUB_OUTPUT"
            echo "raw_path=/tmp/wick-agent/bin/$RAW" >> "$GITHUB_OUTPUT"
          fi
          # Gate sidecar — bundled inside .deb/.dmg/.msi, but also
          # uploaded as a standalone asset so install.sh's Termux and
          # dpkg-less branches can fetch it next to the raw binary.
          EXT_GATE=""
          [ "${{ matrix.os }}" = "windows" ] && EXT_GATE=".exe"
          GATE="${NAME}-gate-${{ matrix.os }}-${{ matrix.arch }}${EXT_GATE}"
          echo "gate=$GATE" >> "$GITHUB_OUTPUT"
          echo "gate_path=/tmp/wick-agent/bin/$GATE" >> "$GITHUB_OUTPUT"

      - name: Checksum
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          cd /tmp/wick-agent/bin
          sha256sum "${{ steps.meta.outputs.asset }}" > "${{ steps.meta.outputs.asset }}.sha256"
          if [ "${{ matrix.os }}" = "linux" ] && [ -f "${{ steps.meta.outputs.raw }}" ]; then
            sha256sum "${{ steps.meta.outputs.raw }}" > "${{ steps.meta.outputs.raw }}.sha256"
          fi
          if [ -f "${{ steps.meta.outputs.gate }}" ]; then
            sha256sum "${{ steps.meta.outputs.gate }}" > "${{ steps.meta.outputs.gate }}.sha256"
          fi

      - name: Upload artifact
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wick-lab-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ steps.meta.outputs.asset_path }}
            ${{ steps.meta.outputs.asset_path }}.sha256
            ${{ steps.meta.outputs.raw_path }}
            ${{ steps.meta.outputs.raw_path }}.sha256
            ${{ steps.meta.outputs.gate_path }}
            ${{ steps.meta.outputs.gate_path }}.sha256
          retention-days: 7
          if-no-files-found: ignore

  attach-to-release:
    name: Attach Binaries to Release
    needs: [prepare, build-binaries]
    if: |
      always()
        && needs.build-binaries.result != 'cancelled'
        && needs.build-binaries.result != 'skipped'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          pattern: wick-lab-*

      - name: Verify at least one artifact exists
        shell: bash
        run: |
          if [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "::error::No artifacts produced — every enabled build failed, or every target is disabled."
            exit 1
          fi
          echo "Found artifacts:"
          ls -1 artifacts

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # `upload-artifact` preserves absolute paths (e.g. /tmp/wick-agent/...)
        # under `artifacts/tmp/...` after merge-multiple, so a naive
        # `artifacts/*` glob expands to that nested directory and `gh
        # release upload` errors with `is a directory`. Walk recursively
        # and pass only files.
        run: |
          mapfile -t FILES < <(find artifacts -type f)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No artifact files found under artifacts/."
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${FILES[@]}" \
            --repo "${{ github.repository }}" \
            --clobber

  build-docker:
    name: Build and Push Docker Image
    needs: prepare
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check docker enabled
        id: gate
        shell: bash
        env:
          VAR_VALUE: ${{ vars.BUILD_DOCKER }}
        run: |
          ENABLED="${VAR_VALUE:-true}"
          if [ "$ENABLED" != "true" ]; then
            {
              echo "## ⏭️ DISABLED — Docker image"
              echo ""
              echo "Docker build is disabled. To enable, set repo variable \`BUILD_DOCKER=true\`:"
              echo ""
              echo "Settings → Secrets and variables → Actions → Variables → New repository variable"
              echo ""
              echo "| Name | Value |"
              echo "|------|-------|"
              echo "| \`BUILD_DOCKER\` | \`true\` |"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=DISABLED::Docker build is disabled — set BUILD_DOCKER=true to enable."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=ENABLED::Docker image will be built and pushed."
          fi

      - name: Download wick CLI binary
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: wick-cli-linux
          path: /usr/local/bin

      - name: Make wick executable
        if: steps.gate.outputs.enabled == 'true'
        run: chmod +x /usr/local/bin/wick

      - name: Download project scaffold
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: wick-agent-scaffold
          path: /tmp/wick-agent

      - name: Set up Docker Buildx
        if: steps.gate.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.gate.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.gate.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: /tmp/wick-agent
          push: true
          platforms: ${{ vars.DOCKER_PLATFORM || 'linux/arm64' }}
          tags: |
            ghcr.io/yogasw/wick-agent:latest
            ghcr.io/yogasw/wick-agent:${{ github.ref_name }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
