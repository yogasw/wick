name: Release Artifacts

# Variables (Settings → Secrets and variables → Actions → Variables):
#
#   BUILD_BINARIES   = true/false   enable binary builds (default: true)
#   BUILD_TARGETS    = comma-separated os/arch to build
#                      valid: linux/amd64, linux/arm64, darwin/amd64, darwin/arm64, windows/amd64
#                      default: darwin/amd64,darwin/arm64,windows/amd64
#                      example: linux/amd64,windows/amd64
#   BUILD_DOCKER     = true/false   enable docker build+push (default: true)
#   DOCKER_PLATFORM  = linux/arm64 or linux/amd64 (default: linux/arm64)

on:
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      build_binaries: ${{ steps.cfg.outputs.build_binaries }}
      build_docker: ${{ steps.cfg.outputs.build_docker }}
      docker_platform: ${{ steps.cfg.outputs.docker_platform }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Resolve config
        id: cfg
        run: |
          BUILD_BINARIES="${{ vars.BUILD_BINARIES }}"
          BUILD_DOCKER="${{ vars.BUILD_DOCKER }}"
          DOCKER_PLATFORM="${{ vars.DOCKER_PLATFORM }}"
          echo "build_binaries=${BUILD_BINARIES:-true}" >> "$GITHUB_OUTPUT"
          echo "build_docker=${BUILD_DOCKER:-true}" >> "$GITHUB_OUTPUT"
          echo "docker_platform=${DOCKER_PLATFORM:-linux/arm64}" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        shell: bash
        env:
          TARGETS: ${{ vars.BUILD_TARGETS }}
        run: |
          ALL='[
            {"os":"linux",   "arch":"amd64", "runner":"ubuntu-latest"},
            {"os":"linux",   "arch":"arm64", "runner":"ubuntu-latest"},
            {"os":"darwin",  "arch":"amd64", "runner":"macos-latest", "cgo":"1"},
            {"os":"darwin",  "arch":"arm64", "runner":"macos-latest"},
            {"os":"windows", "arch":"amd64", "runner":"ubuntu-latest"}
          ]'
          if [ -z "$TARGETS" ]; then
            TARGETS="darwin/amd64,darwin/arm64,windows/amd64"
          fi
          if [ "$TARGETS" = "all" ]; then
            MATRIX=$(echo "$ALL" | jq -c .)
          else
            PATTERN=$(echo "$TARGETS" | tr -d ' ' | tr ',' '|')
            MATRIX=$(echo "$ALL" | jq -c --arg p "$PATTERN" 'map(select((.os+"/"+.arch) | test($p)))')
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Cache wick CLI binary
        id: cache-wick
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wick
          key: wick-cli-${{ github.ref_name }}-linux-amd64
          restore-keys: |
            wick-cli-

      - name: Install wick CLI
        if: steps.cache-wick.outputs.cache-hit != 'true'
        run: go install github.com/yogasw/wick@${{ github.ref_name }}

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Init project
        run: wick init wick --skip-setup
        working-directory: /tmp

      - name: Run setup (installs templ + tailwind)
        run: wick setup
        working-directory: /tmp/wick

      - name: Upload wick CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: wick-cli-linux
          path: ~/go/bin/wick
          retention-days: 1

      - name: Upload templ binary
        uses: actions/upload-artifact@v4
        with:
          name: templ-linux
          path: ~/go/bin/templ
          retention-days: 1

      - name: Upload project scaffold
        uses: actions/upload-artifact@v4
        with:
          name: wick-scaffold
          path: /tmp/wick
          retention-days: 1

  build-binaries:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: prepare
    if: needs.prepare.outputs.build_binaries == 'true'
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      # --- download shared artifacts (all runners) ---
      - name: Download project scaffold
        uses: actions/download-artifact@v4
        with:
          name: wick-scaffold
          path: /tmp/wick

      # --- linux / windows runners: use pre-built binaries from prepare job ---
      - name: Download wick CLI binary (linux)
        if: matrix.runner == 'ubuntu-latest'
        uses: actions/download-artifact@v4
        with:
          name: wick-cli-linux
          path: /usr/local/bin

      - name: Download templ binary (linux)
        if: matrix.runner == 'ubuntu-latest'
        uses: actions/download-artifact@v4
        with:
          name: templ-linux
          path: /usr/local/bin

      - name: Make binaries executable (linux)
        if: matrix.runner == 'ubuntu-latest'
        run: chmod +x /usr/local/bin/wick /usr/local/bin/templ

      # --- macOS runner: cache wick + templ, install on miss ---
      - name: Setup Go (macOS)
        if: matrix.runner == 'macos-latest'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Cache wick CLI binary (macOS)
        if: matrix.runner == 'macos-latest'
        id: cache-wick-mac
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wick
          key: wick-cli-${{ github.ref_name }}-darwin
          restore-keys: |
            wick-cli-darwin-

      - name: Cache templ binary (macOS)
        if: matrix.runner == 'macos-latest'
        id: cache-templ-mac
        uses: actions/cache@v4
        with:
          path: ~/go/bin/templ
          key: templ-darwin-${{ github.ref_name }}
          restore-keys: |
            templ-darwin-

      - name: Install wick CLI (macOS, cache miss)
        if: matrix.runner == 'macos-latest' && steps.cache-wick-mac.outputs.cache-hit != 'true'
        run: go install github.com/yogasw/wick@${{ github.ref_name }}

      - name: Install templ (macOS, cache miss)
        if: matrix.runner == 'macos-latest' && steps.cache-templ-mac.outputs.cache-hit != 'true'
        working-directory: /tmp/wick
        run: |
          TEMPL_VERSION=$(go list -m -f '{{.Version}}' github.com/a-h/templ)
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}

      - name: Add Go bin to PATH (macOS)
        if: matrix.runner == 'macos-latest'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # --- wixl for windows cross-compile ---
      - name: Cache wixl (windows cross-compile)
        if: matrix.os == 'windows'
        id: cache-wixl
        uses: actions/cache@v4
        with:
          path: /usr/bin/wixl
          key: wixl-apt-${{ runner.os }}

      - name: Install wixl (windows cross-compile)
        if: matrix.os == 'windows' && steps.cache-wixl.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y wixl

      # templ already in PATH → wick setup skips go install templ
      - name: Setup
        run: wick setup
        working-directory: /tmp/wick

      - name: Build installer
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.cgo || '0' }}
          APP_VERSION: ${{ github.ref_name }}
        run: wick build --installer
        working-directory: /tmp/wick

      - name: Resolve asset name
        id: meta
        shell: bash
        working-directory: /tmp/wick
        run: |
          NAME=$(grep '^name:' wick.yml | awk '{print $2}' | tr -d '"'"'"' ')
          VERSION=${GITHUB_REF_NAME#v}
          case "${{ matrix.os }}" in
            windows) EXT="msi" ;;
            darwin)  EXT="dmg" ;;
            linux)   EXT="deb" ;;
          esac
          ASSET="${NAME}-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.${EXT}"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "asset_path=/tmp/wick/bin/$ASSET" >> "$GITHUB_OUTPUT"

      - name: Checksum
        shell: bash
        run: |
          cd /tmp/wick/bin
          sha256sum "${{ steps.meta.outputs.asset }}" > "${{ steps.meta.outputs.asset }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: wick-lab-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ steps.meta.outputs.asset_path }}
            ${{ steps.meta.outputs.asset_path }}.sha256
          retention-days: 7

  attach-to-release:
    name: Attach Binaries to Release
    needs: [prepare, build-binaries]
    if: needs.prepare.outputs.build_binaries == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          pattern: wick-lab-*

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" artifacts/* \
            --repo "${{ github.repository }}" \
            --clobber

  build-docker:
    name: Build and Push Docker Image
    needs: prepare
    if: needs.prepare.outputs.build_docker == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download wick CLI binary
        uses: actions/download-artifact@v4
        with:
          name: wick-cli-linux
          path: /usr/local/bin

      - name: Make wick executable
        run: chmod +x /usr/local/bin/wick

      - name: Download project scaffold
        uses: actions/download-artifact@v4
        with:
          name: wick-scaffold
          path: /tmp/wick

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: /tmp/wick
          push: true
          platforms: ${{ needs.prepare.outputs.docker_platform }}
          tags: |
            ghcr.io/yogasw/wick:latest
            ghcr.io/yogasw/wick:${{ github.ref_name }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
