name: CI Cache Warm

# GitHub Actions caches are scoped per-branch: a cache saved on a PR
# branch is only readable by that branch (and its children). The ONE
# scope every branch + PR can read is the default branch (master). So
# pr-tests never got a cache hit — it only ever ran on PR branches, and
# nothing populated master.
#
# This workflow runs on push to master and does nothing but warm the
# shared caches (Go build cache, module cache, templ binary) so every
# subsequent PR restores them instead of rebuilding from scratch. It
# does NOT run tests — warming is cheap and keeps master CI fast.
#
# Keys here MUST match the restore keys in pr-tests.yml.

on:
  push:
    branches: [master]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'

# One warm at a time; a newer push supersedes an in-flight warm.
concurrency:
  group: ci-cache-warm
  cancel-in-progress: true

jobs:
  warm:
    name: Warm shared caches
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        id: go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # setup-go caches the module download (~/go/pkg/mod) only — NOT
          # the build cache. We handle build cache separately below.
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Resolve templ version from go.mod
        id: templ
        run: echo "version=$(go list -m -f '{{.Version}}' github.com/a-h/templ)" >> $GITHUB_OUTPUT

      - name: Cache templ binary
        id: cache-templ
        uses: actions/cache@v4
        with:
          path: ~/go/bin/templ
          key: templ-${{ steps.go.outputs.go-version }}-${{ steps.templ.outputs.version }}

      - name: Install templ
        if: steps.cache-templ.outputs.cache-hit != 'true'
        run: go install github.com/a-h/templ/cmd/templ@${{ steps.templ.outputs.version }}

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          # Keyed on go version + go.sum so a dep bump refreshes it; the
          # restore-keys ladder in pr-tests lets a PR fall back to the
          # newest master build cache even when go.sum differs slightly.
          key: go-build-${{ steps.go.outputs.go-version }}-${{ hashFiles('go.sum') }}

      - name: Warm build + test cache
        run: |
          templ generate ./...
          # Compiling the test binaries (without running them) populates
          # ~/.cache/go-build with exactly what the PR job needs, so a PR
          # restoring this cache skips most of the build + test-compile cost.
          # The PR job runs `go test -race`, and race-instrumented objects
          # are a SEPARATE cache entry from plain ones — warm both variants
          # or the PR's -race compile is a fresh miss.
          go build ./internal/... ./cmd/... ./pkg/...
          go test -count=1 -run '^do-not-match$' ./internal/... ./cmd/... ./pkg/...
          go test -race -count=1 -run '^do-not-match$' ./internal/... ./cmd/... ./pkg/...
