# Project display name. Used by the system tray as the title, the MCP
# server name in client configs, and the user-config folder name under
# %APPDATA% / Library / .config. Falls back to the directory basename
# if missing.
name: app

# App semver. Baked into the binary as app.BuildAppVersion via the
# build task ldflags. Surfaced in the tray + advertised to MCP clients.
version: 0.1.0

vars:
  TAILWIND_OS:
    $arch:
      windows: windows-x64.exe
      darwin/arm64: macos-arm64
      darwin: macos-x64
      linux/arm64: linux-arm64
      linux: linux-x64
  TAILWIND_VERSION: 3.4.0
  TAILWIND_BIN:
    $arch:
      windows: bin/tailwindcss.exe
      default: bin/tailwindcss

tasks:
  setup:
    cmds:
      - mkdir -p bin static
      - if_missing:
          file: "{{.TAILWIND_BIN}}"
        download:
          dest: "{{.TAILWIND_BIN}}"
          url: "https://github.com/tailwindlabs/tailwindcss/releases/download/v{{.TAILWIND_VERSION}}/tailwindcss-{{.TAILWIND_OS}}"
          cache: true
      - run: |
          TEMPL_VERSION=$(go list -m -f '{{.Version}}' github.com/a-h/templ)
          echo "Using templ $TEMPL_VERSION (matches go.mod)"
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}
      - go mod tidy
    done: |
      Setup complete!
      Run: wick dev

  css:
    cmds:
      - "{{.TAILWIND_BIN}} -i web/input.css -o static/output.css --minify"

  dev:
    cmds:
      - templ generate ./...
      - "{{.TAILWIND_BIN}} -i web/input.css -o static/output.css"
      - go run . server

  generate:
    cmds:
      - templ generate ./...
      - go generate ./...
      - "{{.TAILWIND_BIN}} -i web/input.css -o static/output.css --minify"

  test:
    cmds:
      - go test ./... -coverprofile=./coverage.out

  tidy:
    cmds:
      - go fmt ./...
      - go mod tidy -v

  clean:
    cmds:
      - rm -rf bin static/output.css
