display_information:
  name: Wick Agent
  description: AI agent bot powered by Wick
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: Wick Agent
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write
      - reactions:write
      - usergroups:read
      - channels:history
      - groups:history
      - im:history
      - mpim:history

settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
