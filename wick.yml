name: wick-lab
version: 0.6.4

vars:
  TAILWIND_OS:
    $arch:
      windows: windows-x64.exe
      darwin/arm64: macos-arm64
      darwin: macos-x64
      linux/arm64: linux-arm64
      linux: linux-x64
  TAILWIND_VERSION: 3.4.17
  TAILWIND_BIN:
    $arch:
      windows: bin/tailwindcss.exe
      default: bin/tailwindcss
  LAB_BIN:
    $arch:
      windows: lab.exe
      default: ./lab
  # GATE_ASSET is the platform-specific path inside assets/ that Go embeds
  # into the main binary via //go:embed all:assets in internal/agents/gate/embed.go.
  # Name must match embeddedGateName(): gate-<os>-<arch>[.exe]
  GATE_ASSET:
    $arch:
      windows: internal/agents/gate/assets/gate-windows-amd64.exe
      darwin/arm64: internal/agents/gate/assets/gate-darwin-arm64
      darwin: internal/agents/gate/assets/gate-darwin-amd64
      linux/arm64: internal/agents/gate/assets/gate-linux-arm64
      linux: internal/agents/gate/assets/gate-linux-amd64
  # LDFLAGS bakes the app name into both binaries so paths (socket, logs,
  # spec) resolve correctly regardless of the working directory at runtime.
  LDFLAGS: -X=github.com/yogasw/wick/internal/appname.BuildAppName=wick-lab

tasks:
  setup:
    cmds:
      - mkdir -p bin web/public/js web/public/css
      - if_missing:
          file: "{{.TAILWIND_BIN}}"
        download:
          dest: "{{.TAILWIND_BIN}}"
          url: "https://github.com/tailwindlabs/tailwindcss/releases/download/v{{.TAILWIND_VERSION}}/tailwindcss-{{.TAILWIND_OS}}"
          cache: true
      - if_missing:
          cmd: templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - go mod tidy
    done: |
      Setup complete!
      Run: wick dev

  css:
    cmds:
      - "{{.TAILWIND_BIN}} -i web/src/input.css -o web/public/css/app.css --minify"

  dev:
    cmds:
      - templ generate ./...
      - "{{.TAILWIND_BIN}} -i web/src/input.css -o web/public/css/app.css"
      - go build -ldflags={{.LDFLAGS}} -o "{{.GATE_ASSET}}" ./cmd/gate/
      - go build -ldflags={{.LDFLAGS}} -o "{{.LAB_BIN}}" ./cmd/lab/
      - "{{.LAB_BIN}} server"

  build:
    cmds:
      - templ generate ./...
      - "{{.TAILWIND_BIN}} -i web/src/input.css -o web/public/css/app.css --minify"
      - go build -ldflags={{.LDFLAGS}} -o "{{.GATE_ASSET}}" ./cmd/gate/
      - go build -ldflags={{.LDFLAGS}} -o "{{.LAB_BIN}}" ./cmd/lab/
    done: |
      Build complete! Binary: {{.LAB_BIN}} (gate embedded)

  generate:
    cmds:
      - templ generate ./...
      - go generate ./...
      - "{{.TAILWIND_BIN}} -i web/src/input.css -o web/public/css/app.css --minify"

  test:
    cmds:
      - go test ./... -coverprofile=./coverage.out

  tidy:
    cmds:
      - go fmt ./...
      - go mod tidy -v
